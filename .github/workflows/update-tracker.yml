name: Update Macro Indicator Tracker

on:
  schedule:
    # Every Wednesday at 9 PM UTC (5 PM ET)
    - cron: '0 21 * * 3'
  workflow_dispatch:  # Allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run tracker update
        run: python scripts/update_tracker.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html tracker-data.json
          git diff --staged --quiet || git commit -m "Auto-update macro indicator tracker $(date '+%Y-%m-%d')"
          git push
